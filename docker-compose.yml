version: '3.8'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  userservice:
    build: ./src/Services/UserService
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CareNotesUsers;User Id=sa;Password=Your_password123;
      - Jwt__Key=ReplaceThisWithASecretKey123!
    depends_on:
      - sqlserver
    ports:
      - "5001:80"

  noteservice:
    build: ./src/Services/NoteService
    environment:
      - ConnectionStrings__Mongo=mongodb://mongo:27017
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672/
      - Jwt__Key=ReplaceThisWithASecretKey123!
    depends_on:
      - mongo
      - rabbitmq
    ports:
      - "5002:80"

  pdfworker:
    build: ./src/Services/PDFWorker
    environment:
      - ConnectionStrings__Mongo=mongodb://mongo:27017
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672/
      - AzureBlobConnectionString=
    depends_on:
      - mongo
      - rabbitmq

  gateway:
    build: ./src/Gateway.Ocelot
    ports:
      - "8000:80"
    depends_on:
      - userservice
      - noteservice
